<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-labelledby="title desc">
<title id="title">Morse Code Rhythmizer</title>
<desc id="desc">Abstract artwork made from Morse-code dots and dashes on a dark background.</desc>
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0%" stop-color="#090b12"/>
    <stop offset="100%" stop-color="#11141f"/>
  </linearGradient>
  <linearGradient id="g" x1="0" x2="1">
    <stop offset="0%" stop-color="#65e4d3"/>
    <stop offset="100%" stop-color="#f3c667"/>
  </linearGradient>
</defs>
<rect width="1200" height="750" fill="url(#bg)"/>
<g opacity="0.16">
  <circle cx="210" cy="130" r="180" fill="#65e4d3"/>
  <circle cx="1020" cy="640" r="240" fill="#f3c667"/>
</g>
<g transform="translate(120 145)">
  <text x="0" y="0" fill="#f5f4ef" font-family="Arial, Helvetica, sans-serif" font-size="58" letter-spacing="8">MORSE CODE RHYTHMIZER</text>
  <text x="0" y="70" fill="#a9adba" font-family="Arial, Helvetica, sans-serif" font-size="26" letter-spacing="2">TEXT → MORSE → RHYTHM → SYNTH</text>
</g>
<g transform="translate(120 285)" fill="url(#g)">
  <circle cx="30" cy="0" r="20"/><rect x="100" y="-18" width="110" height="36" rx="18"/>
  <circle cx="300" cy="0" r="20"/><circle cx="370" cy="0" r="20"/><circle cx="440" cy="0" r="20"/>
  <rect x="540" y="-18" width="160" height="36" rx="18"/><circle cx="790" cy="0" r="20"/><rect x="860" y="-18" width="110" height="36" rx="18"/>
</g>
<g transform="translate(120 420)">
  <path d="M0 90 C120 20, 220 160, 340 90 S560 20, 680 90 S900 160, 1020 90" fill="none" stroke="#f5f4ef" stroke-width="8" stroke-linecap="round"/>
  <path d="M0 120 C120 50, 220 190, 340 120 S560 50, 680 120 S900 190, 1020 120" fill="none" stroke="#65e4d3" stroke-opacity="0.7" stroke-width="4" stroke-linecap="round"/>
</g>
<g transform="translate(120 620)" fill="#cdd0d8" font-family="Arial, Helvetica, sans-serif" font-size="24" letter-spacing="2">
  <text x="0" y="0">FREE DOWNLOAD</text>
  <text x="300" y="0">DRUMS + SYNTH</text>
  <text x="620" y="0">EXPERIMENTAL SEQUENCING</text>
</g>
</svg>